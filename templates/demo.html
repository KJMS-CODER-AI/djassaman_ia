<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DjassamanIA — Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== HEADER ===== */
.top-header {
  width: 100%;
  background: #111b21;
  color: #fff;
  padding: 0.9rem 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand { display:flex; align-items:center; gap:0.6rem; font-weight:700; font-size:1.05rem; }
.brand-dot { width:10px; height:10px; border-radius:50%; background:#25D366; }
.brand small { font-weight:400; color:#8696a0; font-size:0.75rem; display:block; }

/* ===== SELECTEUR DE SECTEUR ===== */
.secteur-bar {
  width: 100%;
  max-width: 480px;
  display: flex;
  gap: 0.5rem;
  padding: 0.8rem 1rem;
  overflow-x: auto;
  background: #fff;
  border-bottom: 1px solid #e9edef;
}
.secteur-chip {
  flex-shrink: 0;
  padding: 0.5rem 0.9rem;
  border-radius: 20px;
  border: 1.5px solid #d1d7db;
  background: #fff;
  font-size: 0.8rem;
  font-weight: 600;
  color: #54656f;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.secteur-chip.active {
  background: #25D366;
  border-color: #25D366;
  color: #fff;
}

/* ===== CHAT WINDOW ===== */
.phone-frame {
  width: 100%;
  max-width: 480px;
  height: calc(100vh - 130px);
  display: flex;
  flex-direction: column;
  background: #efeae2;
  background-image:
    linear-gradient(rgba(239,234,226,0.9), rgba(239,234,226,0.9)),
    repeating-linear-gradient(45deg, #e5ded6 0, #e5ded6 1px, transparent 1px, transparent 12px);
}

.chat-header {
  background: #202c33;
  color: #fff;
  padding: 0.8rem 1.1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.chat-header .avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg,#25D366,#128C7E);
  display: flex; align-items:center; justify-content:center;
  font-weight: 700;
  font-size: 0.95rem;
  flex-shrink: 0;
}
.chat-header .infos { flex: 1; }
.chat-header .infos .nom { font-weight: 600; font-size: 0.95rem; }
.chat-header .infos .statut { font-size: 0.72rem; color: #8696a0; }
.chat-header .infos .statut.en-ligne { color: #25D366; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 0.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.bulle {
  max-width: 78%;
  padding: 0.5rem 0.7rem 0.35rem;
  border-radius: 8px;
  font-size: 0.88rem;
  line-height: 1.4;
  position: relative;
  animation: popIn 0.18s ease;
  white-space: pre-wrap;
  word-wrap: break-word;
}
@keyframes popIn { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform: translateY(0);} }

.bulle.assistant {
  align-self: flex-start;
  background: #fff;
  border-top-left-radius: 0;
  box-shadow: 0 1px 1px rgba(0,0,0,0.08);
}
.bulle.user {
  align-self: flex-end;
  background: #d9fdd3;
  border-top-right-radius: 0;
  box-shadow: 0 1px 1px rgba(0,0,0,0.08);
}
.bulle .heure {
  font-size: 0.65rem;
  color: #667781;
  text-align: right;
  margin-top: 2px;
}

.bulle-systeme {
  align-self: center;
  background: #fef9e7;
  border: 1px solid #fce8a8;
  color: #7a6a1f;
  font-size: 0.76rem;
  padding: 0.45rem 0.8rem;
  border-radius: 8px;
  max-width: 85%;
  text-align: center;
  animation: popIn 0.2s ease;
}

.typing-bulle {
  align-self: flex-start;
  background: #fff;
  padding: 0.6rem 0.9rem;
  border-radius: 8px;
  border-top-left-radius: 0;
  display: none;
  gap: 4px;
  box-shadow: 0 1px 1px rgba(0,0,0,0.08);
}
.typing-bulle.visible { display: flex; align-items:center; }
.typing-bulle span {
  width: 6px; height: 6px;
  background: #8696a0;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-bulle span:nth-child(2) { animation-delay: 0.2s; }
.typing-bulle span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

/* ===== INPUT ===== */
.chat-input-bar {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.6rem 0.8rem;
  background: #f0f2f5;
}
.chat-input-bar input {
  flex: 1;
  padding: 0.7rem 1rem;
  border-radius: 24px;
  border: none;
  font-size: 0.9rem;
  outline: none;
}
.chat-input-bar button {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: none;
  background: #25D366;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.1s;
}
.chat-input-bar button:active { transform: scale(0.92); }
.chat-input-bar button svg { width: 20px; height: 20px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #c3c9cd; border-radius: 3px; }
</style>
</head>
<body>

<div class="top-header">
  <div class="brand">
    <span class="brand-dot"></span>
    <div>
      DjassamanIA
      <small>Demo interactive multi-secteurs</small>
    </div>
  </div>
</div>

<div class="secteur-bar" id="secteur-bar"></div>

<div class="phone-frame">
  <div class="chat-header">
    <div class="avatar" id="avatar-initiale">?</div>
    <div class="infos">
      <div class="nom" id="entreprise-nom">Choisissez un secteur</div>
      <div class="statut en-ligne" id="entreprise-statut">en ligne</div>
    </div>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="typing-bulle" id="typing-bulle"><span></span><span></span><span></span></div>
  </div>

  <div class="chat-input-bar">
    <input type="text" id="message-input" placeholder="Ecrivez un message..." disabled>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
    </button>
  </div>
</div>

<script>
const socket = io();

let entrepriseActuelle = null;
let sessionId = sessionStorage.getItem('djassaman_session_id');

const chatMessages = document.getElementById('chat-messages');
const typingBulle = document.getElementById('typing-bulle');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const secteurBar = document.getElementById('secteur-bar');
const entrepriseNom = document.getElementById('entreprise-nom');
const avatarInitiale = document.getElementById('avatar-initiale');

async function initialiser() {
  if (!sessionId) {
    const r = await fetch('/api/nouvelle-session');
    const data = await r.json();
    sessionId = data.session_id;
    sessionStorage.setItem('djassaman_session_id', sessionId);
  }

  const res = await fetch('/api/entreprises');
  const entreprises = await res.json();

  entreprises.forEach((e, index) => {
    const chip = document.createElement('button');
    chip.className = 'secteur-chip' + (index === 0 ? ' active' : '');
    chip.textContent = e.secteur;
    chip.dataset.id = e.id;
    chip.onclick = () => choisirSecteur(e, chip);
    secteurBar.appendChild(chip);
  });

  if (entreprises.length > 0) {
    choisirSecteur(entreprises[0], secteurBar.querySelector('.secteur-chip'));
  }
}

function choisirSecteur(entreprise, chipElement) {
  entrepriseActuelle = entreprise;

  document.querySelectorAll('.secteur-chip').forEach(c => c.classList.remove('active'));
  chipElement.classList.add('active');

  entrepriseNom.textContent = entreprise.nom;
  avatarInitiale.textContent = entreprise.nom.charAt(0).toUpperCase();
  avatarInitiale.style.background = `linear-gradient(135deg, ${entreprise.couleur_primaire}, #128C7E)`;

  chatMessages.innerHTML = '';
  chatMessages.appendChild(typingBulle);

  messageInput.disabled = false;
  sendBtn.disabled = false;
  messageInput.focus();

  socket.emit('demarrer_conversation', { entreprise_id: entreprise.id, session_id: sessionId });
}

function heureActuelle() {
  const d = new Date();
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function ajouterBulle(texte, role) {
  const bulle = document.createElement('div');
  bulle.className = 'bulle ' + role;
  bulle.innerHTML = escapeHTML(texte) + '<div class="heure">' + heureActuelle() + '</div>';
  chatMessages.insertBefore(bulle, typingBulle);
  scrollEnBas();
}

function ajouterBulleSysteme(texte) {
  const bulle = document.createElement('div');
  bulle.className = 'bulle-systeme';
  bulle.textContent = texte;
  chatMessages.insertBefore(bulle, typingBulle);
  scrollEnBas();
}

function escapeHTML(texte) {
  const div = document.createElement('div');
  div.textContent = texte;
  return div.innerHTML.replace(/\n/g, '<br>');
}

function scrollEnBas() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function envoyerMessage() {
  const texte = messageInput.value.trim();
  if (!texte || !entrepriseActuelle) return;

  ajouterBulle(texte, 'user');
  messageInput.value = '';

  socket.emit('envoyer_message', {
    entreprise_id: entrepriseActuelle.id,
    session_id: sessionId,
    message: texte,
  });
}

sendBtn.addEventListener('click', envoyerMessage);
messageInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') envoyerMessage();
});

socket.on('conversation_initialisee', (data) => {
  chatMessages.innerHTML = '';
  chatMessages.appendChild(typingBulle);

  if (data.historique && data.historique.length > 0) {
    data.historique.forEach(m => {
      ajouterBulle(m.contenu, m.role === 'user' ? 'user' : 'assistant');
    });
  } else if (data.message_accueil) {
    ajouterBulle(data.message_accueil, 'assistant');
  }
});

socket.on('en_train_decrire', () => {
  typingBulle.classList.add('visible');
  scrollEnBas();
});

socket.on('nouvelle_reponse', (data) => {
  typingBulle.classList.remove('visible');
  ajouterBulle(data.reponse, 'assistant');

  (data.evenements || []).forEach(ev => {
    if (ev.type === 'commande_creee') {
      ajouterBulleSysteme(' Commande enregistree — Total : ' + Math.round(ev.details.total) + ' FCFA');
    } else if (ev.type === 'rdv_cree') {
      ajouterBulleSysteme('Rendez-vous confirme — ' + ev.details.libelle + ', ' + ev.details.jour + ' a ' + ev.details.heure);
    }
  });
});

socket.on('erreur', (data) => {
  typingBulle.classList.remove('visible');
  ajouterBulleSysteme('⚠️ ' + data.message);
});

initialiser();
</script>

</body>
</html>
